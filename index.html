<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/cart.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anta&display=swap"
      rel="stylesheet"
    />

    <title>Fix My Shop</title>
  </head>
  <body>
    <span class="cartIndex">
      <a href="./html/cart.html">
        <i
          class="fa-solid fa-cart-shopping fa-fade"
          style="--fa-animation-duration: 5s; --fa-fade-opacity: 0.6"
          alt="Shopping cart"
        ></i>
      </a>
    </span>
    <header>
      <a href="./index.html" alt="Home">
        <img class="logo" src="./img/logoNEW.png" alt="Logo" />
      </a>
    </header>

    <nav>
      <section class="card">
        <a href="./index.html" class="active">
          <div class="animated_card2">
            <span class="fa fa-address-card-o"></span>
            <h3>Home</h3>
          </div>
        </a>

        <a href="./html/service.html">
          <div class="animated_card2">
            <span class="fa fa-code"></span>
            <h3>What we do</h3>
          </div>
        </a>

        <a href="./html/about.html">
          <div class="animated_card2">
            <span class="fa fa-users"></span>
            <h3>About Us</h3>
          </div>
        </a>
        <a href="./html/contact.html">
          <div class="animated_card2">
            <span class="fa-regular fa-paper-plane"></span>
            <h3>Contact Us</h3>
          </div>
        </a>
      </section>
    </nav>

    <hr class="line" />

    <section>
      <div class="title">
        <h1>
          Service for Web-development and
          <img
            class="shop-logo"
            src="./img/shopify-logoOK.png"
            alt="Shopify logo"
          />
          store setup
        </h1>
        <!-- <div class="pageOne">home</div> -->
      </div>
    </section>

    <hr class="line" />

    <section class="heroBg">
      <div class="hero">
        <div>
          <img
            src="img/website.svg"
            alt="Illustration of computer displaying website"
            class="website"
          />
        </div>
        <div class="start">
          <!-- <h2>Web development</h2> -->

          <div class="listing">
            <p>
              Building your webpage, updating your Shopify store, customizing
              your Shopify store, setting up your Shopify store, help with
              Shopify, help with anything else...
            </p>
            <p>...we do it all!</p>
          </div>
        </div>
      </div>
    </section>
    <script>
      // JavaScript to highlight the active link
      document.addEventListener("DOMContentLoaded", function () {
        const links = document.querySelectorAll("nav a"); // Select all nav links
        links.forEach((link) => {
          if (link.href === window.location.href) {
            link.classList.add("active"); // Add 'active' class to the current page link
          }
        });
      });
    </script>
  </body>

  <script
    src="https://kit.fontawesome.com/6dbf9872e5.js"
    crossorigin="anonymous"
  ></script>
</html>
